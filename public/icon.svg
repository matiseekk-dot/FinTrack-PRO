<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="96"  y="280" width="80" height="160" rx="12" fill="url(#bar2)" opacity="0.9"/>
  <rect x="216" y="180" width="80" height="260" rx="12" fill="url(#bar1)" opacity="0.9"/>
  <rect x="336" y="220" width="80" height="220" rx="12" fill="url(#bar3)" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="136,290 256,195 376,235"
    fill="none" stroke="white" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Dots on line -->
  <circle cx="136" cy="290" r="14" fill="white" opacity="0.95"/>
  <circle cx="256" cy="195" r="14" fill="white" opacity="0.95"/>
  <circle cx="376" cy="235" r="14" fill="white" opacity="0.95"/>
  <!-- Top line for visual weight -->
  <rect x="96" y="96" width="200" height="14" rx="7" fill="white" opacity="0.25"/>
</svg>